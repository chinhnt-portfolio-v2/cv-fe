name: Compile CV PDFs

on:
  push:
    branches:
      - main
    paths:
      - 'Nguyen-The-Chinh-CV-*.typ'
  workflow_dispatch:

jobs:
  compile-and-deploy:
    name: Compile â†’ Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download fonts
        run: |
          mkdir -p fonts
          BASE="https://raw.githubusercontent.com/google/fonts/main/ofl/roboto"
          for variant in Regular Bold Light Medium Thin; do
            curl -sL "$BASE/Roboto-$variant.ttf" -o "fonts/Roboto-$variant.ttf"
          done
          ls fonts/

      - name: Compile EN CV
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/fonts:/fonts:ro" \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            ghcr.io/typst/typst:latest \
            /bin/sh -c "cp /fonts/*.ttf /usr/share/fonts/truetype/ && fc-cache -f && typst compile Nguyen-The-Chinh-CV-EN.typ public/cv-en.pdf"

      - name: Compile VI CV
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/fonts:/fonts:ro" \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            ghcr.io/typst/typst:latest \
            /bin/sh -c "cp /fonts/*.ttf /usr/share/fonts/truetype/ && fc-cache -f && typst compile Nguyen-The-Chinh-CV-VN.typ public/cv-vi.pdf"

      - name: Commit PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/cv-en.pdf public/cv-vi.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes"
          else
            git commit -m "chore: auto-compile CV PDFs"
            git push
          fi
