name: Compile CV PDFs

on:
  push:
    branches:
      - main
    paths:
      - 'Nguyen-The-Chinh-CV-*.typ'
  workflow_dispatch:

jobs:
  compile-and-deploy:
    name: Compile → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install typst + fonts
        run: |
          curl -fsSL https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar xJf typst.tar.xz
          chmod +x typst-x86_64-unknown-linux-musl/typst
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          sudo apt-get update && sudo apt-get install -y fonts-roboto fonts-dejavu-core
          typst --version

      - name: Compile EN CV
        run: typst compile --root . Nguyen-The-Chinh-CV-EN.typ public/cv-en.pdf

      - name: Compile VI CV
        run: typst compile --root . Nguyen-The-Chinh-CV-VN.typ public/cv-vi.pdf

      - name: Commit PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/cv-en.pdf public/cv-vi.pdf
          if git diff --staged --quiet; then echo "No PDF changes"; else git commit -m "chore: auto-compile CV PDFs"; git push; fi
