name: Compile CV PDFs

on:
  push:
    branches:
      - main
    paths:
      - 'Nguyen-The-Chinh-CV-*.typ'
  workflow_dispatch:

jobs:
  compile-and-deploy:
    name: Compile â†’ Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fonts
        run: |
          apt-get update && apt-get install -y fonts-roboto fonts-dejavu-extra 2>&1 | tail -3
          fc-list | grep -i roboto | head -3

      - name: Compile EN CV
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -v "/usr/share/fonts:/usr/share/fonts:ro" \
            -w /data \
            ghcr.io/typst/typst:latest \
            compile Nguyen-The-Chinh-CV-EN.typ public/cv-en.pdf

      - name: Compile VI CV
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -v "/usr/share/fonts:/usr/share/fonts:ro" \
            -w /data \
            ghcr.io/typst/typst:latest \
            compile Nguyen-The-Chinh-CV-VN.typ public/cv-vi.pdf

      - name: Commit PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/cv-en.pdf public/cv-vi.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes"
          else
            git commit -m "chore: auto-compile CV PDFs"
            git push
          fi
